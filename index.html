<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>用户登录</title>

<style>
body {
  background: #0f172a;
  color: #e5e7eb;
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#1e293b;
  padding:30px;
  border-radius:10px;
  width:300px;
}

input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:5px;
}

button {
  width:100%;
  padding:10px;
  background:#38bdf8;
  border:none;
  cursor:pointer;
}

#result {
  margin-top:15px;
  font-size:13px;
  word-break:break-all;
}
</style>

</head>
<body>

<div class="box">
  <h3>登录获取订阅</h3>

  <input id="user" placeholder="用户名">
  <input id="pass" type="password" placeholder="密码">

  <button onclick="login()">登录</button>

  <div id="result"></div>
</div>

<script>
async function login() {
  const username = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const res = await fetch("https://login.shareme.eu.cc/api/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("result").innerHTML = `
      ✅ 登录成功<br><br>
      <div id="link">${data.token}</div>
      <br>
      <button onclick="copy()">复制订阅</button>
    `;
  } else {
    document.getElementById("result").innerText = "❌ 登录失败";
  }
}

function copy() {
  const text = document.getElementById("link").innerText;
  navigator.clipboard.writeText(text);
  alert("已复制");
}
</script>

</body>
</html>
