<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>用户登录</title>
<style>
body {
  background:#0f172a;
  color:#e5e7eb;
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
}
input {
  width:100%;
  margin:8px 0;
  padding:8px;
}
button {
  width:100%;
  padding:10px;
  margin-top:10px;
}
#result {
  margin-top:15px;
  font-size:13px;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="box">
  <h3>🔐 用户登录</h3>

  <input id="user" placeholder="用户名">
  <input id="pass" type="password" placeholder="密码">

  <button onclick="login()">登录</button>

  <div id="result"></div>
</div>

<script>
async function login() {
  const username = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const res = await fetch("https://yonghu-denglu-xitong.wbxzztla.workers.dev/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (!data.ok) {
    document.getElementById("result").innerHTML = "❌ " + data.msg;
    return;
  }

  document.getElementById("result").innerHTML = `
    ✅ 登录成功<br><br>
    <div id="sub">${data.sub}</div>
    <button onclick="copy()">复制订阅</button>
  `;
}

function copy() {
  const text = document.getElementById("sub").innerText;
  navigator.clipboard.writeText(text);
  alert("已复制");
}
</script>

</body>
</html>
